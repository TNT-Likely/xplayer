# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/images/xplayer-logo.png"

  android: "launcher_icon"
  image_path_android: "assets/images/xplayer-logo.png"
  # min_sdk_android: 21 # android min sdk min:16, default 21
  # # adaptive_icon_background: "assets/icon/background.png"
  # # adaptive_icon_foreground: "assets/icon/foreground.png"

  ios: true
  image_path_ios: "assets/images/xplayer-logo.png"
  # 关键:正确的 key 是 remove_alpha_ios(之前写成 remove_alpha_channel_ios 不生效,
  # 导致 1024 图标带 alpha → App Store ITMS-90717 被拒)。透明像素填黑(图标本身黑底)。
  remove_alpha_ios: true
  background_color_ios: "#000000"

  web:
    generate: true
    image_path: "assets/images/xplayer-logo.png"
    # background_color: "#hexcode"
    # theme_color: "#hexcode"

  windows:
    generate: true
    image_path: "assets/images/xplayer-logo.png"
    icon_size: 48 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/images/xplayer-logo.png"
