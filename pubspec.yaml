name: xplayer
description: "Cross-platform IPTV/M3U player with channel grouping, search, EPG and built-in iptv-org sources."

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  bot_toast: ^4.1.3
  cached_network_image: ^3.3.1
  chewie: ^1.7.5
  device_info_plus: ^11.2.1
  dio: ^5.4.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  font_awesome_flutter: ^11.0.0
  http: ^1.2.0
  open_filex: ^4.5.0
  intl_utils: ^2.8.7
  json_annotation: ^4.9.0
  m3u_parser_nullsafe: ^1.0.3
  package_info_plus: ^8.1.2
  path: ^1.8.3
  path_provider: ^2.1.4
  provider: ^6.1.2
  screenshot: ^3.0.0
  shared_preferences: ^2.2.3
  sqflite: ^2.3.2
  sqflite_common: ^2.5.4+6
  sqflite_common_ffi: ^2.3.4+4
  # 桌面端(Windows/Linux)用 FFI 时需要它打包 sqlite3 原生库,否则开库失败
  sqlite3_flutter_libs: ^0.5.0
  url_launcher: ^6.3.1
  # spike: 升到最新(Flutter 3.44),验证新版 platformView/SurfaceView 是否解决 TV 模糊+卡顿
  video_player: ^2.11.1
  video_player_win: ^3.1.1
  xml: ^6.5.0
  bonsoir: ^5.1.11
  web_socket_channel: ^2.4.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  file_picker: ^8.0.3
  qr_flutter: ^4.1.0
  wakelock_plus: ^1.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
